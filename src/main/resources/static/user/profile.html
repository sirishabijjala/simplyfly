<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SimplyFly | User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#1E88E5;
--secondary:#42A5F5;
--bg:#f5f9fd;
}

body{
background:var(--bg);
font-family:'Segoe UI',sans-serif;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
background:linear-gradient(180deg,#42A5F5,#1E88E5);
min-height:100vh;
color:white;
padding-top:10px;
box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

.sidebar h4{
font-weight:700;
padding:22px 10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.nav-link{
color:white;
padding:14px 25px;
font-size:15px;
display:flex;
align-items:center;
gap:10px;
transition:.3s;
}

.nav-link:hover{
background:rgba(255,255,255,0.1);
color:white;
}

/* HEADER */

.main-header{
background:white;
padding:18px 30px;
border-bottom:1px solid #eaeaea;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTENT */

#content-area{
background:white;
border-radius:12px;
padding:35px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* PROFILE CARD */

.profile-card{
text-align:center;
margin-bottom:30px;
}

.profile-card img{
border-radius:50%;
border:4px solid #1E88E5;
margin-bottom:10px;
}

/* TABLE */

.table th{
width:180px;
color:#1E88E5;
}

.table tbody tr:hover{
background:#f3f8ff;
}

.section-title{
color:#1E88E5;
font-weight:700;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container-fluid p-0">

<div class="row g-0">

<!-- SIDEBAR -->

<nav class="col-md-3 col-lg-2 sidebar">

<h4 class="text-center">
<i class="fa-solid fa-plane"></i>
SimplyFly
</h4>

<ul class="nav flex-column">

<li>
<a class="nav-link" href="#" onclick="showSection('profile')">
<i class="fa-solid fa-user"></i>
My Profile
</a>
</li>

<li>
<a class="nav-link" href="/user/my-bookings.html">
<i class="fa-solid fa-ticket"></i>
My Bookings
</a>
</li>

<li>
<a class="nav-link" href="/user/manage-booking.html">
<i class="fa-solid fa-plane-departure"></i>
Manage Booking
</a>
</li>

<li class="mt-4">
<a class="nav-link" href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</nav>


<!-- MAIN -->

<main class="col-md-9 col-lg-10">

<header class="main-header">

<h5 class="m-0 text-secondary">
User Dashboard
</h5>

<span class="badge bg-primary p-2">
<i class="fa-solid fa-user"></i>
User Session
</span>

</header>


<div class="p-4">

<div id="content-area">

<!-- PROFILE SECTION -->

<div id="profileSection">

<h2 class="section-title">
<i class="fa-solid fa-id-card"></i>
My Profile
</h2>

<div class="profile-card">

<img id="profileAvatar"
src="https://ui-avatars.com/api/?name=User&background=ffffff&color=1E88E5"
width="90">

<h5 id="profileName">User</h5>

<p id="profileEmail"></p>

</div>

<table class="table">

<tr>
<th>User ID</th>
<td id="profileId"></td>
</tr>

<tr>
<th>Name</th>
<td id="profileName2"></td>
</tr>

<tr>
<th>Email</th>
<td id="profileEmail2"></td>
</tr>

<tr>
<th>Role</th>
<td id="profileRole"></td>
</tr>

<tr>
<th>Status</th>
<td id="profileStatus"></td>
</tr>

<tr>
<th>Phone</th>
<td id="profilePhone"></td>
</tr>

<tr>
<th>Address</th>
<td id="profileAddress"></td>
</tr>

<tr>
<th>Gender</th>
<td id="profileGender"></td>
</tr>

<tr>
<th>Date Of Birth</th>
<td id="profileDob"></td>
</tr>

</table>

</div>

</div>

</div>

</main>

</div>

</div>

<script src="/js/profile.js"></script>

</body>

</html>
