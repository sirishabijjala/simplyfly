<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SimplyFly - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold text-primary" href="#">SimplyFly</a>
    <div class="ms-auto">
        <button class="btn btn-outline-primary me-2" onclick="goToBookings()">Manage Booking</button>
        <button class="btn btn-primary" onclick="logout()">Login</button>
    </div>
</nav>

<!-- HERO SECTION -->
<div class="hero-section text-white text-center py-5">
    <h2 class="fw-bold">Book Domestic & International Flights</h2>
    <p>Find best fares, seat selection & manage bookings easily</p>
</div>

<!-- SEARCH CARD -->
<div class="container search-container">
    <div class="card shadow-lg p-4 rounded-4">

        <h4 class="mb-4 fw-bold">Search Flights</h4>

        <!-- Flight Type -->
        <div class="mb-3">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="flightType" id="oneWay" value="oneWay" checked>
                <label class="form-check-label" for="oneWay">One-way</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="flightType" id="roundTrip" value="roundTrip">
                <label class="form-check-label" for="roundTrip">Return</label>
            </div>
        </div>

        <form id="flightSearchForm">

            <div class="row g-3 mb-3">

                <!-- From & To -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">From</label>
                    <select class="form-select" id="origin" required>
                        <option value="" disabled selected>Choose origin city</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Kolkata">Kolkata</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">To</label>
                    <select class="form-select" id="destination" required>
                        <option value="" disabled selected>Choose destination city</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Kolkata">Kolkata</option>
                    </select>
                </div>

            </div>

            <div class="row g-3 mb-3">

                <!-- Dates -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Journey Date</label>
                    <input type="date" class="form-control" id="journeyDate" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Return Date</label>
                    <input type="date" class="form-control" id="returnDate">
                </div>

            </div>

            <div class="row g-3 mb-3">

                <!-- Passengers & Class -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">Passengers</label>
                    <div class="dropdown">
                        <button class="btn btn-outline-primary w-100 text-start" type="button" id="passengersDropdown"
                                data-bs-toggle="dropdown" aria-expanded="false">
                            Passengers: <span id="passengerSummary">1 Adult</span>
                        </button>
                        <ul class="dropdown-menu p-3" aria-labelledby="passengersDropdown" style="width: 250px;">
                            <li class="d-flex justify-content-between align-items-center mb-2">
                                <span>Adults (+12 yrs)</span>
                                <div>
                                    <button type="button" class="btn btn-sm btn-outline-primary me-1" onclick="decrement('adult')">-</button>
                                    <span id="adultCount">1</span>
                                    <button type="button" class="btn btn-sm btn-outline-primary ms-1" onclick="increment('adult')">+</button>
                                </div>
                            </li>
                            <li class="d-flex justify-content-between align-items-center mb-2">
                                <span>Children (2-12 yrs)</span>
                                <div>
                                    <button type="button" class="btn btn-sm btn-outline-primary me-1" onclick="decrement('child')">-</button>
                                    <span id="childCount">0</span>
                                    <button type="button" class="btn btn-sm btn-outline-primary ms-1" onclick="increment('child')">+</button>
                                </div>
                            </li>
                            <li class="d-flex justify-content-between align-items-center">
                                <span>Infants (<2 yrs)</span>
                                <div>
                                    <button type="button" class="btn btn-sm btn-outline-primary me-1" onclick="decrement('infant')">-</button>
                                    <span id="infantCount">0</span>
                                    <button type="button" class="btn btn-sm btn-outline-primary ms-1" onclick="increment('infant')">+</button>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Class</label>
                    <select class="form-select" id="travelClass">
                        <option value="Economy">Economy</option>
                        <option value="Business">Business</option>
                        <option value="First">First</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>

            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5 fw-bold">Search Flights</button>
            </div>

        </form>

    </div>
</div>

<script src="/js/user.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
