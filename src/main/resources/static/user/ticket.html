<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SimplyFly Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:#eef3f8;
font-family:Arial;
}

.ticket-container{
max-width:900px;
margin:auto;
margin-top:40px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.ticket-header{
background:#1e88e5;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.ticket-header h3{
margin:0;
font-weight:bold;
}

.ticket-body{
padding:30px;
}

.flight-route{
font-size:30px;
font-weight:bold;
color:#333;
}

.section-title{
font-weight:bold;
color:#1e88e5;
margin-bottom:10px;
}

.passenger-box{
background:#f7f9fc;
border-radius:8px;
padding:10px;
margin-bottom:10px;
}

.qr-box{
text-align:center;
}

.print-section{
text-align:center;
margin-top:30px;
}

</style>

</head>

<body>

<div class="ticket-container" id="ticket">

<div class="ticket-header">

<div>
<h3>SimplyFly Airlines</h3>
<small>E‑Ticket</small>
</div>

<div>
<strong id="bookingRef"></strong>
</div>

</div>


<div class="ticket-body">

<div class="row mb-4">

<div class="col-md-8">

<div class="flight-route">
<span id="origin"></span>
✈
<span id="destination"></span>
</div>

<div>
Flight: <strong id="flightName"></strong>
</div>

<div>
Booking Date: <strong id="bookingDate"></strong>
</div>

</div>

<div class="col-md-4 qr-box">
<div id="qrcode"></div>
</div>

</div>


<hr>

<h5 class="section-title">Passengers</h5>

<div id="passengerList"></div>


<hr>

<div class="row">

<div class="col-md-4">
<strong>Total Seats</strong>
<div id="seatCount"></div>
</div>

<div class="col-md-4">
<strong>Total Fare</strong>
<div id="totalFare"></div>
</div>

<div class="col-md-4">
<strong>Status</strong>
<div id="status"></div>
</div>

</div>

</div>

</div>


<div class="print-section">

<button class="btn btn-primary me-2" onclick="window.print()">
Print Ticket
</button>

<button class="btn btn-success" onclick="saveTicket()">
Save Ticket
</button>

</div>


<script>

const params = new URLSearchParams(window.location.search);
const bookingId = params.get("bookingId");


async function loadTicket(){

try{

const token = localStorage.getItem("token");

const response = await fetch(`/simplyfly/GetBookingById/${bookingId}`,{

headers:{
"Authorization":"Bearer "+token
}

});

if(!response.ok){
throw new Error("Failed to fetch booking data");
}

const data = await response.json();


document.getElementById("bookingRef").innerText =
"Ref: "+data.bookingReference;

document.getElementById("origin").innerText =
data.origin;

document.getElementById("destination").innerText =
data.destination;

document.getElementById("flightName").innerText =
data.flightName;

document.getElementById("bookingDate").innerText =
new Date(data.bookingDate).toLocaleString();

document.getElementById("seatCount").innerText =
data.numberOfSeats;

document.getElementById("totalFare").innerText =
"₹ "+data.totalAmount;

document.getElementById("status").innerText =
data.bookingStatus;


const passengerList = document.getElementById("passengerList");

data.passengers.forEach(p=>{

const div = document.createElement("div");

div.className="passenger-box";

div.innerHTML=`
<div class="row">

<div class="col-md-3">
<strong>Name</strong>
<div>${p.name}</div>
</div>

<div class="col-md-2">
<strong>Age</strong>
<div>${p.age}</div>
</div>

<div class="col-md-2">
<strong>Gender</strong>
<div>${p.gender}</div>
</div>

<div class="col-md-3">
<strong>Seat</strong>
<div>${p.seatId}</div>
</div>

</div>
`;

passengerList.appendChild(div);

});


new QRCode(document.getElementById("qrcode"),{
text:data.bookingReference,
width:120,
height:120
});


}
catch(err){

alert("Error loading booking: "+err.message);

}

}



async function saveTicket(){

const { jsPDF } = window.jspdf;

const ticket = document.getElementById("ticket");

const canvas = await html2canvas(ticket);

const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF();

const width = pdf.internal.pageSize.getWidth();

const height = canvas.height * width / canvas.width;

pdf.addImage(imgData,"PNG",0,10,width,height);

pdf.save("SimplyFly_Ticket_"+bookingId+".pdf");

}


loadTicket();

</script>

</body>
</html>
