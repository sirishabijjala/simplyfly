<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passenger Details | SimplyFly</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f9ff;
}

/* Header */
.page-header{
    background:white;
    border-bottom:1px solid #e5e5e5;
    padding:20px;
    margin-bottom:30px;
}

.page-title{
    font-weight:600;
    color:#1E88E5;
}

/* Passenger Card */

.passenger-card{
    background:white;
    border-radius:12px;
    padding:25px;
    border:1px solid #e1e8f5;
    margin-bottom:20px;
}

.passenger-title{
    font-weight:600;
    margin-bottom:15px;
}

/* Seat Badge */

.seat-badge{
    background:#E3F2FD;
    color:#1E88E5;
    padding:5px 12px;
    border-radius:20px;
    font-size:14px;
}

/* Input Fields */

.form-label{
    font-weight:500;
}

.form-control{
    border-radius:8px;
}

.form-control:focus{
    border-color:#1E88E5;
    box-shadow:0 0 5px rgba(30,136,229,0.25);
}

/* Booking Summary */

.summary-box{
    background:white;
    border-radius:12px;
    padding:20px;
    border:1px solid #e1e8f5;
}

/* Button */

.btn-book{
    background:#1E88E5;
    color:white;
    font-weight:600;
    padding:12px;
}

.btn-book:hover{
    background:#1565C0;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="page-header">
<div class="container">

<h4 class="page-title">Passenger Information</h4>
<p class="text-muted mb-0">Enter details for each traveler</p>

</div>
</div>


<div class="container">

<div class="row">

<!-- Passenger Forms -->

<div class="col-lg-8">

<div id="passengerForms"></div>

</div>


<!-- Booking Summary -->

<div class="col-lg-4">

<div class="summary-box shadow-sm">

<h5 class="mb-3">Booking Summary</h5>

<p>
<strong>Selected Seats</strong>
</p>

<p id="seatSummary" class="text-primary fw-bold"></p>

<hr>

<button class="btn btn-book w-100" onclick="submitBooking()">
Confirm Booking
</button>

</div>

</div>

</div>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const scheduleId = params.get("scheduleId");
const seatNumbers = params.get("seats")?.split(",");

const passengerContainer = document.getElementById("passengerForms");
const seatSummary = document.getElementById("seatSummary");

seatSummary.innerText = seatNumbers.join(", ");


/* Generate Passenger Forms */

function createPassengerForms(){

if(!seatNumbers){
alert("No seats selected");
return;
}

seatNumbers.forEach((seat,index)=>{

const form = `
<div class="passenger-card shadow-sm">

<div class="d-flex justify-content-between align-items-center mb-3">

<div class="passenger-title">
Passenger ${index+1}
</div>

<div class="seat-badge">
Seat ${seat}
</div>

</div>

<div class="row g-3">

<div class="col-md-5">

<label class="form-label">Full Name</label>

<input type="text" class="form-control name" placeholder="Enter passenger name">

</div>

<div class="col-md-3">

<label class="form-label">Age</label>

<input type="number" class="form-control age" placeholder="Age">

</div>

<div class="col-md-4">

<label class="form-label">Gender</label>

<select class="form-control gender">

<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>

</select>

</div>

<input type="hidden" class="seat" value="${seat}">

</div>

</div>
`;

passengerContainer.innerHTML += form;

});

}



/* Submit Booking */

async function submitBooking(){

const names = document.querySelectorAll(".name");
const ages = document.querySelectorAll(".age");
const genders = document.querySelectorAll(".gender");
const seats = document.querySelectorAll(".seat");

let passengers = [];

for(let i=0;i<names.length;i++){

passengers.push({

name : names[i].value,
age : parseInt(ages[i].value),
gender : genders[i].value,
seatNumber : seats[i].value

});

}


const bookingRequest = {

scheduleId : parseInt(scheduleId),
paymentMethod : "CARD",
passengers : passengers

};


try{

const token = localStorage.getItem("token");

const response = await fetch("/simplyfly/BookTicket",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify(bookingRequest)

});


if(!response.ok){

const msg = await response.text();
throw new Error(msg);

}

const data = await response.json();
alert("Booking Successful! Booking ID: " + data.bookingId);
window.location.href = `/user/ticket.html?bookingId=${data.bookingId}`;


}
catch(err){

alert("Booking Failed: "+err.message);

}

}


createPassengerForms();

</script>

</body>
</html>
