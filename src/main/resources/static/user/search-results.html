<!DOCTYPE html>
<html>
<head>
    <title>Flight Results - SimplyFly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold text-primary" href="/user/dashboard.html">
        <i class="fa-solid fa-plane-departure"></i> SimplyFly
    </a>

    <div class="ms-auto">
        <button class="btn btn-outline-primary me-2"
            onclick="window.location.href='/user/dashboard.html'">
            <i class="fa-solid fa-magnifying-glass"></i> Search Flights
        </button>

        <button class="btn btn-primary"
            onclick="window.location.href='/auth/login.html'">
            Logout
        </button>
    </div>
</nav>


<!-- PAGE HEADER -->
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">
            <i class="fa-solid fa-plane"></i> Available Flights
        </h3>

        <button class="btn btn-outline-secondary"
            onclick="window.location.href='/user/dashboard.html'">
            <i class="fa-solid fa-arrow-left"></i> Modify Search
        </button>
    </div>

    <div id="results"></div>

</div>


<script>

    async function loadFlightResults() {

        const params = new URLSearchParams(window.location.search);

        const origin = params.get("origin");
        const destination = params.get("destination");
        const date = params.get("journeyDate"); 

        const resultsContainer = document.getElementById("results");

        resultsContainer.innerHTML = `
            <div class="text-center mt-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 fw-bold">Searching for best flights...</p>
            </div>
        `;

        try {

            const response = await fetch(`/api/flights/search?source=${origin}&destination=${destination}&date=${date}`);

            if (!response.ok)
                throw new Error("No flights found for this route/date.");

            const flights = await response.json();

            if (flights.length === 0) {

                resultsContainer.innerHTML = `
                    <div class="alert alert-info mt-4 text-center">
                        <h5>No Flights Available</h5>
                        <p>
                            We couldn't find any flights from 
                            <b>${origin}</b> to <b>${destination}</b> 
                            on <b>${date}</b>.
                        </p>
                    </div>
                `;
                return;
            }

            let html = "";

            flights.forEach(f => {

                const depTime = new Date(f.departureTime)
                    .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const arrTime = new Date(f.arrivalTime)
                    .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                html += `

                <div class="card p-4 shadow-sm border-0 mb-3">

                    <div class="row align-items-center text-center text-md-start">

                        <!-- Flight Name -->
                        <div class="col-md-3">
                            <h5 class="text-primary fw-bold mb-0">
                                <i class="fa-solid fa-plane-departure"></i>
                                ${f.flightName}
                            </h5>

                            <small class="text-muted">
                                ${f.flightNumber}
                            </small>
                        </div>


                        <!-- Flight Timing -->
                        <div class="col-md-6">

                            <div class="d-flex justify-content-between align-items-center">

                                <div>
                                    <h5 class="mb-0">${depTime}</h5>
                                    <span class="text-muted small">${f.source}</span>
                                </div>

                                <div class="flex-grow-1 border-bottom mx-3 position-relative" style="height:1px;">
                                    <i class="fa-solid fa-plane text-secondary position-absolute start-50 translate-middle-y"></i>
                                </div>

                                <div>
                                    <h5 class="mb-0">${arrTime}</h5>
                                    <span class="text-muted small">${f.destination}</span>
                                </div>

                            </div>

                        </div>


                        <!-- Price & Book -->
                        <div class="col-md-3 text-md-end mt-3 mt-md-0">

                            <h4 class="text-success fw-bold mb-1">
                                ₹ ${f.fare.toLocaleString()}
                            </h4>

                            <p class="text-muted small mb-2">
                                ${f.availableSeats} seats left
                            </p>

                            <button class="btn btn-primary w-100 fw-bold"
                                onclick="window.location.href='/user/seat-selection.html?scheduleId=${f.scheduleId}'">

                                Select Seats

                            </button>

                        </div>

                    </div>

                </div>
                `;
            });

            resultsContainer.innerHTML = html;

        }

        catch (error) {

            resultsContainer.innerHTML = `
                <div class="alert alert-danger mt-4 text-center">
                    ${error.message}
                </div>
            `;
        }

    }


    function selectFlight(scheduleId) {

        window.location.href = `/user/seat-selection.html?scheduleId=${scheduleId}`;

    }


    loadFlightResults();

</script>





</body>
</html>
