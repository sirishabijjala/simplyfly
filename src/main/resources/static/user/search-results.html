
<!DOCTYPE html>
<html>
<head>
    <title>Flight Results - SimplyFly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h3>Available Flights</h3>
    <div id="results"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const origin = params.get("origin");
    const destination = params.get("destination");
    const date = params.get("date");

    // Dummy static result (Later connect to backend)
    document.getElementById("results").innerHTML = `
        <div class="card p-4 shadow mt-3">
            <h5>${origin} → ${destination}</h5>
            <p><strong>Date:</strong> ${date}</p>
            <p><strong>Fare:</strong> ₹4500</p>
            <p><strong>Baggage:</strong> Check-in 15kg | Cabin 7kg</p>
            <button class="btn btn-success"
                onclick="window.location.href='/user/seat-selection.html'">
                Select Seats
            </button>
        </div>
    `;
</script>

</body>
</html>
