<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#f4f8ff;
font-family: Arial, Helvetica, sans-serif;
}

/* Navbar */
.navbar{
background:#0d6efd;
}

.navbar-brand{
color:white;
font-weight:bold;
font-size:22px;
}

/* Title */
.page-title{
color:#0d6efd;
font-weight:600;
}

/* Booking Card */
.booking-card{
border:none;
border-left:6px solid #0d6efd;
border-radius:10px;
transition:0.3s;
}

.booking-card:hover{
transform:scale(1.02);
box-shadow:0px 8px 18px rgba(0,0,0,0.15);
}

.flight-name{
color:#0d6efd;
font-weight:bold;
}

</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand text-white">✈ SimplyFly</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4 page-title">My Bookings</h2>

<div id="bookingList"></div>

</div>

<script>

async function loadBookings(){

const token = localStorage.getItem("token");

const response = await fetch("/simplyfly/GetAll",{
headers:{
"Authorization":"Bearer "+token
}
});

const bookings = await response.json();

let html="";

bookings.forEach(b=>{

html+=`
<div class="card mb-3 booking-card shadow-sm">
<div class="card-body">

<h5 class="flight-name">${b.flightName}</h5>

<p>
<b>From:</b> ${b.origin} <br>
<b>To:</b> ${b.destination}
</p>

<p>
<b>Booking ID:</b> ${b.bookingId}<br>
<b>Seats:</b> ${b.numberOfSeats}<br>
<b>Total:</b> ₹${b.totalAmount}
</p>

</div>
</div>
`;

});

document.getElementById("bookingList").innerHTML=html;

}

loadBookings();

</script>

</body>
</html>
