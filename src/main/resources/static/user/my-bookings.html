<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">My Bookings</h2>

<div id="bookingList"></div>

</div>

<script>

async function loadBookings(){

const token = localStorage.getItem("token");

const response = await fetch("/simplyfly/GetAll",{
headers:{
"Authorization":"Bearer "+token
}
});

const bookings = await response.json();

let html="";

bookings.forEach(b=>{

html+=`
<div class="card mb-3 shadow-sm">
<div class="card-body">

<h5>${b.flightName}</h5>

<p>
<b>From:</b> ${b.origin} <br>
<b>To:</b> ${b.destination}
</p>

<p>
<b>Booking ID:</b> ${b.bookingId}<br>
<b>Seats:</b> ${b.numberOfSeats}<br>
<b>Total:</b> ₹${b.totalAmount}
</p>

</div>
</div>
`;

});

document.getElementById("bookingList").innerHTML=html;

}

loadBookings();

</script>

</body>
</html>
