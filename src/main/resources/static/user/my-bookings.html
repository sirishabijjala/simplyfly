<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SimplyFly | My Bookings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#1E88E5;
--secondary:#42A5F5;
--bg:#f5f9fd;
}

body{
background:var(--bg);
font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */

.sidebar{
background:linear-gradient(180deg,#42A5F5,#1E88E5);
min-height:100vh;
color:white;
padding-top:10px;
box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

.sidebar h4{
font-weight:700;
padding:22px 10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.nav-link{
color:white;
padding:14px 25px;
display:flex;
align-items:center;
gap:10px;
font-size:15px;
transition:.3s;
}

.nav-link:hover{
background:rgba(255,255,255,0.1);
color:white;
}

/* HEADER */

.main-header{
background:white;
padding:18px 30px;
border-bottom:1px solid #eaeaea;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTENT */

#content-area{
background:white;
border-radius:12px;
padding:35px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* BOOKING CARD */

.booking-card{
border:none;
border-left:6px solid var(--primary);
border-radius:10px;
transition:.3s;
}

.booking-card:hover{
transform:scale(1.02);
box-shadow:0px 8px 18px rgba(0,0,0,0.15);
}

.flight-name{
color:var(--primary);
font-weight:600;
}

.section-title{
color:var(--primary);
font-weight:700;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container-fluid p-0">

<div class="row g-0">

<!-- SIDEBAR -->

<nav class="col-md-3 col-lg-2 sidebar">

<h4 class="text-center">
<i class="fa-solid fa-plane"></i>
SimplyFly
</h4>

<ul class="nav flex-column">

<li>
<a class="nav-link" href="/user/profile.html">
<i class="fa-solid fa-user"></i>
My Profile
</a>
</li>

<li>
<a class="nav-link" href="/user/my-bookings.html">
<i class="fa-solid fa-ticket"></i>
My Bookings
</a>
</li>

<li>
<a class="nav-link" href="/user/manage-booking.html">
<i class="fa-solid fa-plane-departure"></i>
Manage Booking
</a>
</li>

<li class="mt-4">
<a class="nav-link" href="/auth/login.html" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</nav>


<!-- MAIN -->

<main class="col-md-9 col-lg-10">

<header class="main-header">

<h5 class="m-0 text-secondary">
My Flight Bookings
</h5>

<span class="badge bg-primary p-2">
<i class="fa-solid fa-ticket"></i>
Bookings
</span>

</header>

<div class="p-4">

<div id="content-area">

<h2 class="section-title">
<i class="fa-solid fa-ticket"></i>
My Bookings
</h2>

<div id="bookingList"></div>

</div>

</div>

</main>

</div>

</div>

<script>

async function loadBookings(){

const token = localStorage.getItem("token");

const response = await fetch("/simplyfly/GetAll",{
headers:{
"Authorization":"Bearer "+token
}
});

const bookings = await response.json();

let html="";

bookings.forEach(b=>{

html+=`

<div class="card mb-3 booking-card shadow-sm">

<div class="card-body">

<h5 class="flight-name">
<i class="fa-solid fa-plane"></i>
${b.flightName}
</h5>

<p>
<b>From:</b> ${b.origin}
&nbsp;&nbsp;
<i class="fa-solid fa-arrow-right"></i>
&nbsp;&nbsp;
<b>To:</b> ${b.destination}
</p>

<p>

<b>Booking ID:</b> ${b.bookingId} <br>

<b>Seats:</b> ${b.numberOfSeats} <br>

<b>Total Fare:</b> ₹${b.totalAmount}

</p>

</div>

</div>

`;

});

document.getElementById("bookingList").innerHTML=html;

}

function logout(){

localStorage.removeItem("token");

window.location.href="/login.html";

}

loadBookings();

</script>

</body>
</html>
