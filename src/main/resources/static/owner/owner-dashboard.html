<!DOCTYPE html>
<html>
<head>
<title>Flight Owner Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#f4f8ff;
}

.sidebar{
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
border:none;
padding:10px;
background:white;
color:#0d6efd;
border-radius:8px;
font-weight:600;
}

.sidebar button:hover{
background:#e6f0ff;
}

.header{
background:white;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.content{
padding:20px;
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h4>SimplyFly</h4>

<hr>

<button onclick="showSection('flights')">
<i class="fa-solid fa-plane"></i> Flights
</button>

<button onclick="showSection('schedules')">
<i class="fa-solid fa-clock"></i> Schedules
</button>

<button onclick="showSection('bookings')">
<i class="fa-solid fa-ticket"></i> Bookings
</button>

<button onclick="showSection('routes')">
<i class="fa-solid fa-route"></i> Routes
</button>

</div>

<!-- CONTENT -->

<div class="col-md-10">

<div class="header">
<h4>Flight Owner Dashboard</h4>
</div>

<div id="content" class="content">

<h5>Welcome Owner</h5>

</div>

</div>

</div>
</div>

<!-- MODAL -->

<div class="modal fade" id="ownerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 id="modalTitle"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="modalBody"></div>

</div>
</div>
</div>

<script src="/js/owner.js"></script>
<script src="/js/owner-flight.js"></script>
<script src="/js/owner-schedule.js"></script>
<script src="/js/owner-booking.js"></script>
<script src="/js/owner-route.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
