<!DOCTYPE html>
<html>

<head>

<title>Schedules</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2>Schedules</h2>

<input class="form-control mb-2" id="flightId" placeholder="Flight ID">

<button class="btn btn-primary mb-3"
onclick="loadSchedules()">Load Schedules</button>

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Departure</th>
<th>Arrival</th>
<th>Seats</th>
<th>Available</th>
<th>Fare</th>
</tr>
</thead>

<tbody id="scheduleTable"></tbody>

</table>

<h3>Add Schedule</h3>

<input class="form-control mb-2" id="departureTime" placeholder="Departure Time">
<input class="form-control mb-2" id="arrivalTime" placeholder="Arrival Time">
<input class="form-control mb-2" id="totalSeats" placeholder="Total Seats">
<input class="form-control mb-2" id="availableSeats" placeholder="Available Seats">
<input class="form-control mb-2" id="fare" placeholder="Fare">

<button class="btn btn-success" onclick="addSchedule()">Add Schedule</button>

</div>

<script src="/js/schedules.js"></script>

</body>
</html>
