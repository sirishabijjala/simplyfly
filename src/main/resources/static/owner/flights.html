<!DOCTYPE html>
<html>

<head>

<title>Flights</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2>Flights</h2>

<button class="btn btn-primary mb-3"
onclick="loadFlights()">Load Flights</button>

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Number</th>
<th>Cabin Baggage</th>
<th>Checkin Baggage</th>
</tr>
</thead>

<tbody id="flightTable"></tbody>

</table>

<h3>Add Flight</h3>

<input class="form-control mb-2" id="flightName" placeholder="Flight Name">
<input class="form-control mb-2" id="flightNumber" placeholder="Flight Number">
<input class="form-control mb-2" id="cabinBaggage" placeholder="Cabin Baggage">
<input class="form-control mb-2" id="checkInBaggage" placeholder="Checkin Baggage">

<button class="btn btn-success" onclick="addFlight()">Add Flight</button>

</div>

<script src="/js/flights.js"></script>

</body>
</html>
