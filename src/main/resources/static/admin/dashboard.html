<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimplyFly Admin | Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#1E88E5;
--secondary:#42A5F5;
--accent:#90CAF9;
--bg:#f5f9fd;
}

body{
background:var(--bg);
font-family:'Segoe UI',sans-serif;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
background:linear-gradient(180deg,#42A5F5,#1E88E5);
min-height:100vh;
color:white;
padding-top:10px;
box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

.sidebar h4{
font-weight:700;
padding:22px 10px;
margin-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* MENU */

.nav-link{
color:white;
padding:14px 25px;
font-size:15px;
transition:.25s;
display:flex;
align-items:center;
gap:10px;
}

.nav-link:focus{
outline:none;
box-shadow:none;
}
.nav-link i{
width:20px;
text-align:center;
}

/* HOVER */

.nav-link:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
}

/* Updated Active: Light blue background with blue text */
.nav-link.active {
    background: #e3f2fd; /* Very light blue */
    color: #1E88E5;      /* Your primary blue */
    font-weight: 600;
    border-radius: 10px; /* Rounded pill shape */
    margin: 0 10px;      /* Gives it some space from the edge */
}

/* HEADER */

.main-header{
background:white;
padding:18px 30px;
border-bottom:1px solid #eaeaea;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTENT */

#content-area{
background:white;
border-radius:12px;
padding:35px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* BUTTON */

.btn-primary{
background:var(--primary);
border:none;
}

.btn-primary:hover{
background:#1565C0;
}

/* STAT CARDS */

.stat-card{
background:white;
border-radius:12px;
padding:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
transition:.3s;
}

.stat-card:hover{
transform:translateY(-5px);
}

.stat-icon{
font-size:30px;
color:var(--primary);
}

/* TABLE */

.table{
margin-top:15px;
border-radius:10px;
overflow:hidden;
}

.table thead{
background:var(--primary);
color:white;
}

.table tbody tr:hover{
background:#f3f8ff;
}

/* RESPONSIVE */

@media(max-width:768px){

.sidebar{
position:fixed;
width:230px;
z-index:1000;
}

}

</style>
</head>

<body>

<div class="container-fluid p-0">

<div class="row g-0">

<!-- SIDEBAR -->

<nav class="col-md-3 col-lg-2 sidebar">

<h4 class="text-center">
<i class="fa-solid fa-plane-departure"></i>
SimplyFly
</h4>

<ul class="nav flex-column">

<li>
<a class="nav-link" href="#" onclick="showSection('users')">
<i class="fa-solid fa-users"></i>
Manage Users
</a>
</li>

<li>
<a class="nav-link" href="#" onclick="showSection('owners')">
<i class="fa-solid fa-user-tie"></i>
Flight Owners
</a>
</li>

<li>
<a class="nav-link" href="#" onclick="showSection('routes')">
<i class="fa-solid fa-route"></i>
Flight Routes
</a>
</li>

<li>
<a class="nav-link" href="#" onclick="showSection('bookings')">
<i class="fa-solid fa-ticket"></i>
Bookings
</a>
</li>

<li class="mt-4">
<a class="nav-link" href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</nav>


<!-- MAIN -->

<main class="col-md-9 col-lg-10">

<header class="main-header">

<h5 class="m-0 text-secondary">
Administrator Portal
</h5>

<span class="badge bg-primary p-2">
<i class="fa-solid fa-user-shield"></i>
Admin Session
</span>

</header>

<div class="p-4">

<div id="content-area">

<h2 class="text-primary fw-bold">
Welcome back, Admin!
</h2>

<p class="text-muted mb-4">
Use the side navigation to manage airline operations and users.
</p>

<div class="row g-4">

<div class="col-md-4">

<div class="stat-card">

<div class="d-flex justify-content-between align-items-center">

<div>
<h6 class="text-muted">Active Routes</h6>
<h3 id="stat-routes">...</h3>
</div>

<i class="fa-solid fa-route stat-icon"></i>

</div>

</div>

</div>


<div class="col-md-4">

<div class="stat-card">

<div class="d-flex justify-content-between align-items-center">

<div>
<h6 class="text-muted">Total Users</h6>
<h3 id="stat-users">...</h3>
</div>

<i class="fa-solid fa-users stat-icon"></i>
</div>

</div>

</div>

</div>

</div>

</div>

</main>

</div>

</div>


<div class="modal fade" id="adminModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalTitle">Management</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalBody">
        </div>
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/admin-route.js"></script>
    <script src="/js/admin-user.js"></script>
    <script src="/js/admin-owner.js"></script>
    <script src="/js/admin-booking.js"></script>
</body>
</html>
