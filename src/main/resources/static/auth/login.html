<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(120deg,#74ebd5,#9face6);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-card{
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.form-control{
border-radius:10px;
}

.btn-success{
border-radius:10px;
padding:10px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card login-card">

<div class="row g-0">



<div class="col-md-6 d-none d-md-block">

<img src="https://img.freepik.com/free-vector/login-concept-illustration_114360-739.jpg"
class="img-fluid h-100"
style="object-fit:cover;border-top-left-radius:15px;border-bottom-left-radius:15px;">

</div>



<div class="col-md-6">

<div class="card-body p-5">

<h3 class="mb-4 text-center">Welcome</h3>

<form id="loginForm">

<input class="form-control mb-3"
type="email"
id="email"
placeholder="Email Address"
required>

<input class="form-control mb-3"
type="password"
id="password"
placeholder="Password"
required>

<button class="btn btn-success w-100">
Login
</button>

<p class="text-center mt-3">
Don't have an account? 
<a href="register.html">Register</a>
</p>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="/js/login.js"></script>

</body>
</html>
